<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <g id="background">
    <rect x="0" y="0" width="1024" height="1024" fill="#1F5F66"/>
  </g>

  <g id="velocity-streaks" fill="none" stroke="#FBB83D" stroke-linecap="round">
    <line x1="180" y1="160" x2="540" y2="520" stroke-width="22"/>
    <line x1="280" y1="120" x2="600" y2="440" stroke-width="20"/>
    <line x1="120" y1="260" x2="500" y2="640" stroke-width="20"/>
    <line x1="380" y1="100" x2="640" y2="360" stroke-width="18"/>
    <line x1="100" y1="380" x2="460" y2="740" stroke-width="18"/>
    <line x1="220" y1="200" x2="520" y2="500" stroke-width="18"/>
  </g>

  <g id="trailing-dashes" fill="none" stroke="#F2EAD3" stroke-linecap="round" stroke-width="22">
    <line x1="80" y1="80" x2="150" y2="150"/>
    <line x1="200" y1="60" x2="260" y2="120"/>
    <line x1="60" y1="200" x2="120" y2="260"/>
  </g>

  <g id="impact-arc" fill="none" stroke="#FBB83D" stroke-width="26" stroke-linecap="round">
    <path d="M 760 880 A 360 360 0 0 1 880 760"/>
    <path d="M 700 900 A 440 440 0 0 1 900 700" opacity="0.55"/>
  </g>

  <g id="foil-disc">
    <circle cx="700" cy="720" r="200" fill="#F2EAD3"/>
    <circle cx="700" cy="720" r="200" fill="none" stroke="#1F5F66" stroke-width="18"/>
  </g>

  <g id="groove-impression">
    <circle cx="700" cy="720" r="36" fill="#1F5F66"/>
    <circle cx="700" cy="720" r="14" fill="#FBB83D"/>
  </g>

  <g id="capture-highlight">
    <path d="M 560 580 L 660 680" fill="none" stroke="#F2EAD3" stroke-width="28" stroke-linecap="round"/>
  </g>
</svg>
