<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="stageGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="stageGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="stageGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" fill="#64748b">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Circular arrow marker for loop arrows -->
    <marker id="loopArrow1" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto" fill="#818cf8">
      <polygon points="0 0, 6 2.5, 0 5"/>
    </marker>
    <marker id="loopArrow2" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto" fill="#3b82f6">
      <polygon points="0 0, 6 2.5, 0 5"/>
    </marker>
    <marker id="loopArrow3" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto" fill="#22c55e">
      <polygon points="0 0, 6 2.5, 0 5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="320" rx="12" fill="#0f172a"/>
  <rect x="1" y="1" width="718" height="318" rx="11" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600" letter-spacing="0.02em">The Closure Pipeline</text>

  <!-- Stage 1: Plan Refinement -->
  <g transform="translate(32, 60)">
    <rect width="185" height="200" rx="10" fill="url(#stageGrad1)" stroke="#4338ca" stroke-width="1" opacity="0.9"/>
    <text x="92" y="30" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">Plan Refinement</text>

    <!-- SVG circular arrow loop -->
    <g transform="translate(92, 95)">
      <!-- Outer ring (subtle) -->
      <circle cx="0" cy="0" r="30" fill="none" stroke="#818cf8" stroke-width="1" stroke-dasharray="3,3" opacity="0.25"/>
      <!-- Main arc — 270 degrees -->
      <path d="M 0,-26 A 26,26 0 1,1 -26,0" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" filter="url(#glow2)" marker-end="url(#loopArrow1)"/>
      <!-- Inner icon — simple refresh/iterate symbol -->
      <path d="M -6,-5 L 6,-5 L 0,-12 Z" fill="#c4b5fd" opacity="0.7"/>
      <path d="M 6,5 L -6,5 L 0,12 Z" fill="#c4b5fd" opacity="0.7"/>
    </g>

    <text x="92" y="148" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="500">INVARIANT</text>
    <text x="92" y="164" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="400">prompt</text>
    <text x="92" y="190" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="500" opacity="0.8">OUTPUT: closed plan</text>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(220, 145)">
    <line x1="0" y1="17" x2="42" y2="17" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="21" y="8" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">becomes</text>
    <text x="21" y="42" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">invariant</text>
  </g>

  <!-- Stage 2: Prototype Validation -->
  <g transform="translate(268, 60)">
    <rect width="185" height="200" rx="10" fill="url(#stageGrad2)" stroke="#1d4ed8" stroke-width="1" opacity="0.9"/>
    <text x="92" y="30" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">Prototype Validation</text>

    <!-- SVG circular arrow loop -->
    <g transform="translate(92, 95)">
      <circle cx="0" cy="0" r="30" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3" opacity="0.25"/>
      <path d="M 0,-26 A 26,26 0 1,1 -26,0" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" filter="url(#glow2)" marker-end="url(#loopArrow2)"/>
      <path d="M -6,-5 L 6,-5 L 0,-12 Z" fill="#93c5fd" opacity="0.7"/>
      <path d="M 6,5 L -6,5 L 0,12 Z" fill="#93c5fd" opacity="0.7"/>
    </g>

    <text x="92" y="148" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="500">INVARIANT</text>
    <text x="92" y="164" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="400">prompt + closed plan</text>
    <text x="92" y="190" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="500" opacity="0.8">OUTPUT: closed prototype</text>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(456, 145)">
    <line x1="0" y1="17" x2="42" y2="17" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="21" y="8" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">becomes</text>
    <text x="21" y="42" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">invariant</text>
  </g>

  <!-- Stage 3: Implementation -->
  <g transform="translate(503, 60)">
    <rect width="185" height="200" rx="10" fill="url(#stageGrad3)" stroke="#15803d" stroke-width="1" opacity="0.9"/>
    <text x="92" y="30" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">Implementation</text>

    <!-- SVG circular arrow loop -->
    <g transform="translate(92, 95)">
      <circle cx="0" cy="0" r="30" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" opacity="0.25"/>
      <path d="M 0,-26 A 26,26 0 1,1 -26,0" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" filter="url(#glow2)" marker-end="url(#loopArrow3)"/>
      <path d="M -6,-5 L 6,-5 L 0,-12 Z" fill="#86efac" opacity="0.7"/>
      <path d="M 6,5 L -6,5 L 0,12 Z" fill="#86efac" opacity="0.7"/>
    </g>

    <text x="92" y="148" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="500">INVARIANT</text>
    <text x="92" y="164" text-anchor="middle" fill="#86efac" font-size="11" font-weight="400">prompt + closed prototype</text>
    <text x="92" y="190" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="500" opacity="0.8">OUTPUT: closed implementation</text>
  </g>

  <!-- Bottom annotation -->
  <text x="360" y="296" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">Each stage's output becomes the next stage's fixed reference</text>
</svg>